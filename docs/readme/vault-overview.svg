<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Learning Obsidian Wiki overview</title>
  <desc id="desc">A dark Obsidian-style overview showing raw evidence flowing into wiki concepts, maps, reviews, scripts, and a public search index.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171A2A"/>
      <stop offset="0.55" stop-color="#22263A"/>
      <stop offset="1" stop-color="#101725"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="80" x2="1040" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F0ABFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      .panel { fill: rgba(255,255,255,0.055); stroke: rgba(203,213,225,0.18); stroke-width: 1.2; }
      .panel-strong { fill: rgba(255,255,255,0.08); stroke: rgba(203,213,225,0.28); stroke-width: 1.2; }
      .muted { fill: #AAB3CF; font: 500 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #D8DDF4; font: 700 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #9AA5C3; font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #818AA8; font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #F8FAFC; font: 800 42px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: rgba(203,213,225,0.22); stroke-width: 1.2; }
      .flow { stroke: url(#accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 10; }
    </style>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="125" cy="90" r="150" fill="#38BDF8" opacity="0.08"/>
  <circle cx="1050" cy="520" r="190" fill="#A78BFA" opacity="0.08"/>
  <path d="M144 116C263 42 410 72 521 143C639 219 745 246 879 211C986 183 1064 222 1110 297" stroke="url(#accent)" stroke-opacity="0.18" stroke-width="34" stroke-linecap="round"/>

  <text x="600" y="74" text-anchor="middle" class="title">Agentic Learning Obsidian Wiki</text>
  <text x="600" y="108" text-anchor="middle" class="muted">raw evidence -&gt; structured understanding -&gt; maps, reviews, audits, and public search</text>

  <g filter="url(#shadow)">
    <rect x="70" y="145" width="285" height="395" rx="18" class="panel"/>
    <rect x="93" y="174" width="239" height="42" rx="10" fill="rgba(125,211,252,0.13)" stroke="rgba(125,211,252,0.35)"/>
    <text x="114" y="202" class="label">raw/</text>
    <text x="114" y="244" class="small">source notes</text>
    <text x="114" y="272" class="tiny">papers, docs, repos, articles</text>
    <line x1="93" y1="300" x2="332" y2="300" class="line"/>
    <text x="114" y="335" class="small">evidence anchors</text>
    <text x="114" y="365" class="small">paper priority</text>
    <text x="114" y="395" class="small">source boundaries</text>
    <text x="114" y="425" class="small">frontier watch</text>
    <rect x="93" y="464" width="239" height="44" rx="10" fill="rgba(255,255,255,0.055)" stroke="rgba(203,213,225,0.16)"/>
    <text x="114" y="493" class="tiny">Where did this come from?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="435" y="145" width="330" height="395" rx="18" class="panel-strong"/>
    <rect x="460" y="174" width="280" height="42" rx="10" fill="rgba(167,139,250,0.16)" stroke="rgba(167,139,250,0.42)"/>
    <text x="482" y="202" class="label">wiki/</text>
    <text x="482" y="244" class="small">concept cards and topics</text>
    <text x="482" y="272" class="tiny">learning layer + judgment layer</text>
    <line x1="460" y1="300" x2="740" y2="300" class="line"/>
    <text x="482" y="335" class="small">Concept detail</text>
    <text x="482" y="365" class="small">Not this / boundary details</text>
    <text x="482" y="395" class="small">Modernity status</text>
    <text x="482" y="425" class="small">Evidence anchors</text>
    <text x="482" y="455" class="small">Review triggers</text>
    <rect x="460" y="486" width="280" height="22" rx="11" fill="url(#accent)" opacity="0.42"/>
    <text x="600" y="503" text-anchor="middle" class="tiny" fill="#F8FAFC">How do I understand this?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="845" y="145" width="285" height="395" rx="18" class="panel"/>
    <rect x="868" y="174" width="239" height="42" rx="10" fill="rgba(240,171,252,0.12)" stroke="rgba(240,171,252,0.34)"/>
    <text x="889" y="202" class="label">control surface</text>
    <text x="889" y="244" class="small">maps/</text>
    <text x="889" y="274" class="small">reviews/</text>
    <text x="889" y="304" class="small">scripts/</text>
    <text x="889" y="334" class="small">reports/</text>
    <line x1="868" y1="362" x2="1107" y2="362" class="line"/>
    <text x="889" y="398" class="tiny">navigation, health checks,</text>
    <text x="889" y="422" class="tiny">Feynman review, taxonomy,</text>
    <text x="889" y="446" class="tiny">and reproducible audits</text>
    <rect x="868" y="486" width="239" height="44" rx="10" fill="rgba(255,255,255,0.055)" stroke="rgba(203,213,225,0.16)"/>
    <text x="889" y="515" class="tiny">Where should I go next?</text>
  </g>

  <path d="M355 338C384 338 403 338 432 338" class="flow"/>
  <path d="M765 338C794 338 813 338 842 338" class="flow"/>
  <path d="M600 540C600 568 842 568 960 536" class="flow" opacity="0.65"/>

  <g>
    <circle cx="412" cy="338" r="6" fill="#7DD3FC"/>
    <circle cx="788" cy="338" r="6" fill="#A78BFA"/>
    <circle cx="653" cy="540" r="5" fill="#F0ABFC"/>
  </g>

  <g transform="translate(160 556)">
    <rect x="0" y="0" width="880" height="34" rx="17" fill="rgba(15,23,42,0.48)" stroke="rgba(203,213,225,0.16)"/>
    <text x="31" y="23" class="tiny">Obsidian UI for browsing</text>
    <circle cx="218" cy="17" r="4" fill="#7DD3FC"/>
    <text x="238" y="23" class="tiny">Codex/LLM for maintenance</text>
    <circle cx="456" cy="17" r="4" fill="#A78BFA"/>
    <text x="476" y="23" class="tiny">Git for durable knowledge assets</text>
    <circle cx="724" cy="17" r="4" fill="#F0ABFC"/>
    <text x="744" y="23" class="tiny">search-index.json for public search</text>
  </g>
</svg>
