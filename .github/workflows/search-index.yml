name: Search Index

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-search-index:
    # The vault intentionally contains a few long Chinese Markdown filenames
    # that exceed Linux checkout filename limits on GitHub-hosted runners.
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify generated search index
        run: python3 scripts/build_search_index.py --check
